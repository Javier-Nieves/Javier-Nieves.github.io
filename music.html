    <body style="overflow: hidden">
        <script>
            var i = 1;
            var music;
            function playMusic(){
                if (i % 2 == 0)
                {
                    music.pause()
                }
                else
                {
                    var song = Math.floor(Math.random() * 10) + 1;
                    if (song == 1) {
                        music = new Audio('Music/ceiling.mp3');
                        document.getElementById("demo").innerHTML = "Eddie Vedder"
                        document.getElementById("demo2").innerHTML = "No Ceiling"
                    }
                    else if (song == 2) {
                        music = new Audio('Music/c2c.mp3');
                        document.getElementById("demo").innerHTML = "C2C"
                        document.getElementById("demo2").innerHTML = "Delta"
                    }
                    else if (song == 3) {
                        music = new Audio('Music/happy.mp3');
                        document.getElementById("demo").innerHTML = "Bring Me The Horizon"
                        document.getElementById("demo2").innerHTML = "Happy Song"
                    }
                    else if (song == 4) {
                        music = new Audio('Music/home.mp3');
                        document.getElementById("demo").innerHTML = "Papa Roach"
                        document.getElementById("demo2").innerHTML = "Feel Like Home"
                    }
                    else if (song == 5) {
                    music = new Audio('Music/Keys.mp3');
                    document.getElementById("demo").innerHTML = "Black Keys"
                    document.getElementById("demo2").innerHTML = "Hi/Lo"
                    }
                    else if (song == 6) {
                    music = new Audio('Music/Kunst.mp3');
                    document.getElementById("demo").innerHTML = "Markscheider Kunst"
                    document.getElementById("demo2").innerHTML = "212-85-06"
                    }
                    else if (song == 7) {
                        music = new Audio('Music/Modelo.mp3');
                        document.getElementById("demo").innerHTML = "Bender Bukowski"
                        document.getElementById("demo2").innerHTML = "La Modelo"
                    }
                    else if (song == 8) {
                        music = new Audio('Music/Pop.mp3');
                        document.getElementById("demo").innerHTML = "Icona Pop"
                        document.getElementById("demo2").innerHTML = "Someone Who Can Dance"
                    }
                    else if (song == 9) {
                        music = new Audio('Music/traum.mp3');
                        document.getElementById("demo").innerHTML = "Cro"
                        document.getElementById("demo2").innerHTML = "Traum"
                    }
                    else if (song == 10) {
                        music = new Audio('Music/two.mp3');
                        document.getElementById("demo").innerHTML = "Nero"
                        document.getElementById("demo2").innerHTML = "Two Minds"
                    }
                    music.play();
                }
                i++;
        }
    </script>
